<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrueConnect Admin | Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a class="brand-lockup nav-brand" href="dashboard.html">
        <span class="brand-mark">TC</span>
        <span>TrueConnect</span>
      </a>
      <nav class="nav-list" aria-label="Admin navigation">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="users.html">Users</a>
        <a class="nav-link" href="reports.html">Reports</a>
        <a class="nav-link active" href="support.html">Support</a>
        <a class="nav-link" href="delete-requests.html">Delete Requests</a>
        <a class="nav-link" href="audit-logs.html">Audit Logs</a>
      </nav>
      <button id="logout-button" class="btn btn-secondary btn-full">Sign out</button>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <p class="eyebrow">Customer Care</p>
          <h1>Support Tickets</h1>
          <p>Review incoming issues, write admin replies, and resolve tickets without leaving the moderation workspace.</p>
        </div>
        <button id="refresh-support" class="btn btn-secondary">Refresh</button>
      </header>

      <section class="content-card">
        <div class="section-heading">
          <div>
            <h2>All Support Tickets</h2>
            <p id="support-summary">Loading tickets from Supabase.</p>
          </div>
          <span id="support-status" class="status-pill">Loading</span>
        </div>

        <div class="toolbar">
          <input id="support-search" class="toolbar-input" type="search" placeholder="Search by user, subject, issue type, or message">
          <select id="support-filter-status" class="toolbar-select">
            <option value="all">All statuses</option>
            <option value="open">Open only</option>
            <option value="resolved">Resolved only</option>
          </select>
          <button id="select-all-support" class="btn btn-secondary" type="button">Select Page</button>
          <button id="bulk-resolve-support" class="btn btn-primary" type="button">Bulk Resolve</button>
          <button id="export-support" class="btn btn-secondary" type="button">Export CSV</button>
        </div>

        <div id="support-list" class="stack-list">
          <div class="empty-state">Loading tickets...</div>
        </div>
        <div id="support-pagination" class="pagination-bar"></div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
